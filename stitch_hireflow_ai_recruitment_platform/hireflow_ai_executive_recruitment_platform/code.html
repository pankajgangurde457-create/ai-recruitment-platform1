<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>HireFlow AI - Elite Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Geist:wght@400;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Geist:wght@400;600&display=swap');

        :root {
            --primary-glow: rgba(181, 196, 255, 0.15);
            --electric-blue: #648aff;
            --purple-accent: #4816cb;
        }

        body {
            background-color: #0b0d12;
            color: #e2e2e9;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .glass-card {
            background: rgba(18, 22, 31, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .magnetic-btn {
            position: relative;
            transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
            overflow: hidden;
        }

        .magnetic-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .magnetic-btn:hover::before {
            left: 100%;
        }

        .input-glow:focus-within {
            box-shadow: 0 0 15px rgba(100, 138, 255, 0.3);
            border-color: var(--electric-blue);
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .floating-ai {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        .gradient-text {
            background: linear-gradient(135deg, #b5c4ff 0%, #4cd6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#b5c4ff",
                        "on-secondary-fixed-variant": "#4816cb",
                        "on-primary-fixed-variant": "#003cad",
                        "surface-tint": "#b5c4ff",
                        "primary-container": "#648aff",
                        "inverse-primary": "#1a53d6",
                        "tertiary-fixed": "#b7eaff",
                        "surface-container": "#1e1f25",
                        "surface-container-lowest": "#0c0e13",
                        "on-surface-variant": "#c3c5d7",
                        "surface-container-high": "#282a2f",
                        "secondary-fixed": "#e6deff",
                        "on-secondary-fixed": "#1c0062",
                        "on-error-container": "#ffdad6",
                        "secondary-container": "#4816cb",
                        "tertiary-fixed-dim": "#4cd6ff",
                        "on-tertiary": "#003543",
                        "outline-variant": "#434654",
                        "surface-bright": "#37393f",
                        "on-surface": "#e2e2e9",
                        "surface-container-highest": "#33353a",
                        "primary-fixed": "#dce1ff",
                        "on-tertiary-fixed-variant": "#004e60",
                        "background": "#111318",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#002e3a",
                        "secondary": "#cabeff",
                        "on-tertiary-fixed": "#001f28",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#b9aaff",
                        "on-secondary": "#31009a",
                        "on-primary-fixed": "#00164d",
                        "on-error": "#690005",
                        "on-primary": "#00297b",
                        "surface": "#111318",
                        "outline": "#8d90a0",
                        "inverse-on-surface": "#2e3036",
                        "surface-dim": "#111318",
                        "surface-container-low": "#1a1b21",
                        "on-background": "#e2e2e9",
                        "tertiary-container": "#009dc1",
                        "tertiary": "#4cd6ff",
                        "inverse-surface": "#e2e2e9",
                        "secondary-fixed-dim": "#cabeff",
                        "on-primary-container": "#00236d",
                        "primary-fixed-dim": "#b5c4ff",
                        "surface-variant": "#33353a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "20px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "stack-lg": "32px",
                        "margin-desktop": "48px",
                        "gutter": "24px",
                        "container-max": "1440px",
                        "stack-xl": "64px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-caps": ["Geist"],
                        "display-lg": ["Inter"],
                        "body-base": ["Inter"],
                        "mono-technical": ["Geist"],
                        "headline-md": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="h-screen w-full flex items-center justify-center">
<!-- Split Screen Container -->
<main class="w-full h-full flex flex-col md:flex-row overflow-hidden bg-surface-container-lowest">
<!-- Left Side: Brand & Visuals -->
<section class="hidden md:flex md:w-1/2 h-full relative overflow-hidden bg-[#0b0d12] flex-col justify-between p-12">
<!-- Background Gradients -->
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-on-secondary-fixed-variant/10 blur-[120px] rounded-full"></div>
<!-- Logo Section -->
<div class="relative z-10 flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-primary to-on-secondary-fixed-variant flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary-container" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<span class="font-headline-md text-headline-md font-bold tracking-tight text-on-surface">HireFlow AI</span>
</div>
<!-- Central Illustration -->
<div class="relative z-10 flex-grow flex items-center justify-center">
<div class="floating-ai relative">
<div class="absolute inset-0 bg-primary/20 blur-[80px] rounded-full scale-125"></div>
<img class="w-[480px] h-auto drop-shadow-[0_0_50px_rgba(181,196,255,0.3)] object-contain relative z-10" src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg">
</div>
</div>
<!-- Description -->
<div class="relative z-10 max-w-sm">
<h2 class="font-headline-md text-headline-md font-bold mb-2">Elite recruitment powered by next-gen intelligence.</h2>
<p class="font-body-base text-body-base text-on-surface-variant/80">Streamline your hiring pipeline with precision AI that identifies top talent 10x faster than traditional tools.</p>
</div>
</section>
<!-- Right Side: Login Panel -->
<section class="w-full md:w-1/2 h-full flex items-center justify-center px-6 relative">
<!-- Mobile Background Elements -->
<div class="md:hidden absolute inset-0 bg-[#0b0d12] -z-10">
<div class="absolute top-0 left-0 w-full h-full opacity-20" style="background-image: radial-gradient(circle at 50% 50%, #4816cb, transparent);"></div>
</div>
<!-- Login Card -->
<div class="glass-card w-full max-w-[480px] p-8 md:p-12 rounded-2xl relative overflow-hidden">
<!-- Subtle Shimmer Overlay -->
<div class="shimmer absolute inset-0 pointer-events-none opacity-30"></div>
<div class="relative z-10">
<header class="mb-8">
<h1 class="font-display-lg text-headline-md md:text-display-lg font-bold text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-base text-body-base text-on-surface-variant">Enter your details to access your workspace.</p>
</header>
<form class="space-y-6" id="loginForm">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase" for="email">Email Address</label>
<div class="group relative input-glow rounded-xl border border-outline-variant bg-surface-container-low transition-all duration-300">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary">mail</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-0 font-body-base" id="email" placeholder="name@company.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="text-label-caps font-label-caps text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="group relative input-glow rounded-xl border border-outline-variant bg-surface-container-low transition-all duration-300">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary">lock</span>
<input class="w-full bg-transparent border-none py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-0 font-body-base" id="password" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant bg-surface-container-high text-primary-container focus:ring-primary focus:ring-offset-surface-container-lowest transition-all" id="remember" type="checkbox">
</div>
<label class="font-body-base text-sm text-on-surface-variant select-none cursor-pointer" for="remember">Keep me signed in</label>
</div>
<!-- CTA Button -->
<button class="magnetic-btn w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-headline-md text-body-base font-bold py-4 rounded-xl shadow-lg shadow-primary-container/20 transition-all active:scale-[0.98]" type="submit">
                            Sign In
                        </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="font-label-caps text-label-caps text-outline uppercase">Or continue with</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-3 gap-4">
<button class="flex items-center justify-center py-3 rounded-xl bg-surface-container border border-outline-variant/30 hover:bg-surface-container-high hover:border-outline-variant transition-all duration-300">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path></svg></button></div></div></div></section></main></body></html>
